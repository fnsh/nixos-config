log syslog all;
timeformat protocol iso long;

router id 10.42.20.1;

protocol device {
  scan time 10;
}

protocol kernel kernel_table_v4 {
  ipv4 {
    export all;
    import none;
  };
  persist;
  scan time 10;
  kernel table 100;
}

protocol kernel kernel_table_v6 {
  ipv6 {
    export all;
    import none;
  };
  persist;
  scan time 10;
  kernel table 100;
}

protocol static static_origin_v4 {
  ipv4;
  route 194.180.249.0/24 blackhole;
}

protocol static static_origin_v6 {
  ipv6;
  route 2a13:fcc0::/29 blackhole;
}

protocol static frontend_v4 {
  ipv4;
  route 194.180.249.0/27 via "frontend";
}

protocol static frontend_v6 {
  ipv6;
  route 2a13:fcc0:ebbe:1:401:1000:110::/112 via "frontend";
}

protocol static clientnet_v6 {
  ipv6;
  route 2a13:fcc0:2ed8::/48 via  2a13:fcc0:ebbe:1:401:1000:110:3 dev "frontend";
}

protocol static neanderfunk_v4 {
  ipv4;
  route 194.180.249.40/29 via "neanderfunk";
}

protocol static neanderfunk_v6 {
  ipv6;
  route 2a13:fcc0:3000:300::/64 via "neanderfunk";
}

protocol static neanderfunk_clientnet_v6 {
  ipv6;
  route 2a13:fcc0:2f00::/48 via  2a13:fcc0:3000:300:100::1 dev "neanderfunk";
}

filter export_v4 {
  if net = 194.180.249.0/24 then accept;
  reject;
}

filter export_v6 {
  if net = 2a13:fcc0::/29 then accept;
  reject;
}

function filter_configo() {
  if bgp_path.len <= 1 then {
    # Directly connected
    bgp_local_pref = 200;
  } else if (34154,206) ~ bgp_community then {
    # ERA-IX FRA
    bgp_local_pref = 155;
  } else if (65000,65115) ~ bgp_community then {
    # NL-IX FRA
    bgp_local_pref = 155;
  } else if (34154,200) ~ bgp_community then {
    # Peering
    bgp_local_pref = 120;
  } else if (34154,180) ~ bgp_community then {
    # Transit
    bgp_local_pref = 50;
  } else {
    # Default
    bgp_local_pref = 100;
  }
  accept;
}

filter import_configo {
  filter_configo();
}

filter import_interlink {
  if bgp_path.len <= 1 then {
    # Directly connected
    bgp_local_pref = 200;
  } else if (5405,3008) ~ bgp_community then {
    # Route in FFM
    bgp_local_pref = 150;
  } else {
    # Default
    bgp_local_pref = 100;
  }
  accept;
}

protocol bgp peering_configo_v4 {
  local 217.71.220.139 as 62028;
  neighbor 217.71.220.138 as 34154;
  interface "configo-peer";
  vrf "vrf-as62028";
  direct;

  ipv4 {
    import filter import_configo;
    export filter export_v4;
  };
}

protocol bgp peering_configo_v6 {
  local 2a00:1fe8:1::39 as 62028;
  neighbor 2a00:1fe8:1::38 as 34154;
  interface "configo-peer";
  vrf "vrf-as62028";
  direct;

  ipv6 {
    import filter import_configo;
    export filter export_v6;
  };
}

protocol bgp peering_interlink_v4 {
  local 81.27.69.85 as 62028;
  neighbor 81.27.69.84 as 5405;
  interface "interlink-peer";
  vrf "vrf-as62028";
  direct;

  ipv4 {
    import filter import_interlink;
    export filter export_v4;
  };
}

protocol bgp peering_interlink_v6 {
  local 2a11:4140:9002::31 as 62028;
  neighbor 2a11:4140:9002::30 as 5405;
  interface "interlink-peer";
  vrf "vrf-as62028";
  direct;

  ipv6 {
    import filter import_interlink;
    export filter export_v6;
  };
}
